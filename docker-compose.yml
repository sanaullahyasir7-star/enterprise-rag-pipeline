version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres_db
    environment:
      POSTGRES_USER: ai_engineer
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: rag_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
